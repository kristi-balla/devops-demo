on:
    workflow_call:

jobs:
    hawkeye:
        name: hawkeye
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - uses: actions/checkout@8edcb1bdb4e267140fa742c62e395cd74f332709

            - name: Run Hawkeye
              uses: korandoru/hawkeye@cdc68d9c8ace500aefcd8f4dd39b915cd06305dd
              with:
                  github_token: ${{ github.token }}
